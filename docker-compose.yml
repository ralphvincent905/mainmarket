services:
  mysql:
    image: mysql:8.0
    container_name: mainmarket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mainmarketdb
      MYSQL_USER: mainmarket
      MYSQL_PASSWORD: mainmarket123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mainmarket-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: qa
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: