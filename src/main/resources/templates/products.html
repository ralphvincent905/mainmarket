<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2>Products</h2>

    <a href="/products/new" class="btn btn-primary mb-3">Add Product</a>

    <form method="get" class="row g-3 mb-4">

        <div class="col-md-4">
            <label>Category</label>
            <select name="categoryId" class="form-select">
                <option value="">All</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.categoryId}"
                        th:selected="${selectedCategoryId == cat.categoryId}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <div class="col-md-4">
            <label>Brand</label>
            <select name="brandId" class="form-select">
                <option value="">All</option>
                <option th:each="b : ${brands}"
                        th:value="${b.brandId}"
                        th:selected="${selectedBrandId == b.brandId}"
                        th:text="${b.name}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <label>Sort By</label>
            <select name="sortBy" class="form-select">
                <option value="name">Name</option>
                <option value="price">Price</option>
                <option value="createdAt">Created Date</option>
            </select>
        </div>

        <div class="col-md-2">
            <label>Direction</label>
            <select name="direction" class="form-select">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>

        <div class="col-12">
            <button class="btn btn-secondary">Apply Filters</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Brand</th>
            <th>Price</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${productPage.content}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.category.name}"></td>
            <td th:text="${p.brand.name}"></td>
            <td th:text="${p.price}"></td>
        </tr>
        </tbody>
    </table>

    <nav>
        <ul class="pagination">

            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${productPage.number - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == productPage.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/products(page=${i})}"></a>
            </li>

            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${productPage.number + 1})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
