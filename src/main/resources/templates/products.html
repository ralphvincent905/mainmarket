<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products - MainMarket</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<main class="flex-grow-1">

    <!-- Page Header -->
    <section class="page-hero py-5 mb-4">
        <div class="container">
            <h1 class="fw-bold mb-2 display-5">Products</h1>
            <p class="text-muted mb-0">
                Browse available items, explore listings, and manage marketplace products.
            </p>
        </div>
    </section>

    <div class="container pb-5">

        <!-- Search / Filter Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <h5 class="card-title mb-3">Search and Filter</h5>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label text-muted">Search</label>
                        <input type="text" class="form-control" placeholder="Search products..."
                               style="background-color: #1a1a1a; border-color: #8B0000; color: #cccccc;">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-muted">Category</label>
                        <select class="form-select" style="background-color: #1a1a1a; border-color: #8B0000; color: #cccccc;">
                            <option>All Categories</option>
                            <option>Electronics</option>
                            <option>Clothing</option>
                            <option>Home</option>
                            <option>Beauty</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-muted">Sort By</label>
                        <select class="form-select" style="background-color: #1a1a1a; border-color: #8B0000; color: #cccccc;">
                            <option>Name</option>
                            <option>Price</option>
                            <option>Newest</option>
                            <option>Oldest</option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100">Apply</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product List Card -->
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Product Listings</h5>
                    <span class="text-muted">Showing <span th:text="${productPage.totalElements}">0</span> products</span>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0"
                           style="color: var(--text-gray); border-color: var(--medium-gray);">
                        <thead style="background-color: var(--dark-gray); color: var(--dark-red);">
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Brand</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="p : ${productPage.content}"
                                style="border-color: var(--medium-gray);"
                                onmouseover="this.style.backgroundColor='#2d2d2d'"
                                onmouseout="this.style.backgroundColor=''">
                                <td th:text="${p.name}"></td>
                                <td th:text="${p.category.name}"></td>
                                <td th:text="${p.brand.name}"></td>
                                <td th:text="'$' + ${p.price}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${p.isAvailable} ? 'text-bg-success' : 'text-bg-danger'"
                                          th:text="${p.isAvailable} ? 'Available' : 'Unavailable'">
                                    </span>
                                </td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-primary">View</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav class="mt-4">
                    <ul class="pagination" style="--bs-pagination-color: var(--dark-red);
                                                  --bs-pagination-bg: var(--dark-gray);
                                                  --bs-pagination-border-color: var(--medium-gray);
                                                  --bs-pagination-hover-color: white;
                                                  --bs-pagination-hover-bg: var(--dark-red);
                                                  --bs-pagination-active-bg: var(--dark-red);
                                                  --bs-pagination-active-border-color: var(--dark-red);
                                                  --bs-pagination-disabled-bg: var(--dark-gray);
                                                  --bs-pagination-disabled-color: #555;">

                        <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                            <a class="page-link" th:if="${!productPage.first}"
                               th:href="@{/products(page=${productPage.number - 1}, sortBy=${sortBy}, direction=${direction})}">
                                Previous
                            </a>
                            <a class="page-link" th:if="${productPage.first}" href="#" tabindex="-1" aria-disabled="true">
                                Previous
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                            th:classappend="${i == productPage.number} ? 'active'">
                            <a class="page-link" th:text="${i + 1}"
                               th:href="@{/products(page=${i}, sortBy=${sortBy}, direction=${direction})}"></a>
                        </li>

                        <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                            <a class="page-link" th:if="${!productPage.last}"
                               th:href="@{/products(page=${productPage.number + 1}, sortBy=${sortBy}, direction=${direction})}">
                                Next
                            </a>
                            <a class="page-link" th:if="${productPage.last}" href="#" tabindex="-1" aria-disabled="true">
                                Next
                            </a>
                        </li>

                    </ul>
                </nav>

            </div>
        </div>

    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
