<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2>Add Product</h2>

    <form th:action="@{/products}" th:object="${product}" method="post">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input th:field="*{name}" class="form-control">
            <div class="text-danger" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input th:field="*{price}" type="number" step="0.01" class="form-control">
            <div class="text-danger" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock Quantity</label>
            <input th:field="*{stockQuantity}" type="number" class="form-control">
            <div class="text-danger" th:errors="*{stockQuantity}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-select">
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Brand</label>
            <select th:field="*{brand}" class="form-select">
                <option th:each="b : ${brands}" th:value="${b}" th:text="${b.name}"></option>
            </select>
        </div>

        <button class="btn btn-success">Save Product</button>
    </form>
</div>

</body>
</html>
