<nav th:fragment="navbar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="navbar navbar-expand-lg bg-light border-bottom">
  <div class="container">

    <a class="navbar-brand fw-bold" href="/">MainMarket</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">

      <ul class="navbar-nav mx-auto gap-3">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/products">Products</a>
        </li>

        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'STAFF')">
          <a class="nav-link" href="/products/new">Add Product</a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="/admin/dashboard">Admin Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/about">About</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <div sec:authorize="isAuthenticated()">
          <span style="margin-right: 15px;">
            Hello, <span sec:authentication="name"></span>
            (<span sec:authentication="principal.role"></span>)
          </span>
          <a class="nav-link" href="#" onclick="document.getElementById('logoutForm').submit(); return false;">Logout</a>
          <form id="logoutForm" th:action="@{/logout}" method="post" style="display: none;"></form>
        </div>

        <div sec:authorize="!isAuthenticated()">
          <a class="nav-link" href="/login">Login</a>
          <a class="nav-link" href="/register">Register</a>
        </div>
      </div>

    </div>
  </div>
</nav>
