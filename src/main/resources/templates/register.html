<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mainmarket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .form-control {
            background-color: var(--dark-gray);
            border-color: var(--medium-gray);
            color: var(--text-gray);
        }
        .form-control:focus {
            background-color: var(--dark-gray);
            border-color: var(--dark-red);
            color: var(--text-gray);
            box-shadow: 0 0 0 0.2rem rgba(139, 0, 0, 0.25);
        }
        .form-control::placeholder {
            color: #666666;
        }
        .form-label {
            font-weight: 600;
            color: var(--text-gray);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:insert="fragments/navbar :: navbar"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-sm" style="width: 100%; max-width: 520px;">
        <div class="card-body p-4 p-md-5">

            <h2 class="display-5 text-center mb-4">Create Account</h2>

            <div th:if="${error}"
                 class="alert mb-4"
                 style="background-color: #3a0000; border-color: var(--dark-red); color: #ff6666;">
                <span th:text="${error}"></span>
            </div>

            <div class="alert mb-4"
                 style="background-color: var(--dark-gray); border-color: var(--dark-red); border-left: 4px solid var(--dark-red); color: var(--text-gray);">
                <strong class="dark-red-text">Account Type:</strong> New accounts are created as CUSTOMER accounts. You can browse and purchase products.
            </div>

            <form th:action="@{/register}" method="post">

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" name="firstName"
                               class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" name="lastName"
                               class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required minlength="6">
                    <small class="text-muted">Minimum 6 characters</small>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-control" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary w-100">Create Account</button>

            </form>

            <p class="text-center text-muted mt-4 mb-0">
                Already have an account?
                <a th:href="@{/login}">Sign in here</a>
            </p>

        </div>
    </div>
</main>

<div th:insert="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
